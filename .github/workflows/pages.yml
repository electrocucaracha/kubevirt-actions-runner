name: Deploy Documentation to GitHub Pages
# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "ci/prepare_pages_site.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
permissions: read-all
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    name: Build and prepare GitHub Pages artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
      - name: Configure GitHub Pages settings
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # 6.0.0
      - name: Prepare documentation for GitHub Pages
        run: python3 ci/prepare_pages_site.py docs .pages-src
      - name: Build documentation with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # 1.0.13
        with:
          source: ./.pages-src
          destination: ./_site
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # 4.0.0
        with:
          path: ./_site
  deploy:
    name: Deploy GitHub Pages site
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # 5.0.0
