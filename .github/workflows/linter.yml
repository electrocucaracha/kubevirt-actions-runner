name: "CI: Lint and Static Checks"
# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
permissions: read-all
jobs:
  get-sloc:
    name: Measure Repository SLOC
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "^1.26"
          cache: false
      - name: Install dependencies
        run: go install github.com/boyter/scc/v3@v3.7.0
      - name: Run scc tool
        run: scc --format wide
  check-broken-links:
    name: Validate Documentation Links
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check broken links
        uses: tcort/github-action-markdown-link-check@e7c7a18363c842693fadde5d41a3bd3573a7a225 # v1.1.2
  check-super-linter:
    name: Run Super-Linter Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run super-linter validation
        id: linter-validation
        uses: super-linter/super-linter@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: /
          VALIDATE_GO_MODULES: false
          VALIDATE_GO: false
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_PRE_COMMIT: false
          VALIDATE_SPELL_CODESPELL: false
          SAVE_SUPER_LINTER_OUTPUT: true
          KUBERNETES_KUBECONFORM_OPTIONS: "-ignore-missing-schemas"
          DEFAULT_BRANCH: ${{ github.head_ref || github.ref_name }}
      - uses: GrantBirki/git-diff-action@b27608d18e6dd9b31b46ede56a93e045d3881a28 # v3.0.0
        id: git-diff
        if: failure()
      - name: Get failed linter logs
        id: get-failed-linters
        if: failure()
        run: |
          set -euo pipefail

          ERROR_FILES=$(mktemp)
          find ./super-linter-output/super-linter/ -name '*.json' -exec sh -c 'jq -e ".Exitval != 0" "$1" >/dev/null && printf "%s\0" "$1"' _ {} \; > "$ERROR_FILES"

          if [ -s "$ERROR_FILES" ]; then
            xargs -0 jq -s '.' < "$ERROR_FILES" > linter-errors.json

            # Build a compact, localization-focused summary for agentic analysis.
            jq -r '
              [
                "# Failed Linter Summary",
                "",
                (map(select(.Exitval != 0))
                  | map("- \(.Linter // \"unknown\") | \(.Path // .FilePath // \"unknown-path\") | line \(.Line // .StartLine // \"?\")")
                  | join("\n")
                )
              ]
              | join("\n")
            ' linter-errors.json > linter-summary.md

            echo "has-errors=true" >> "$GITHUB_OUTPUT"
          else
            echo '[]' > linter-errors.json
            printf '# Failed Linter Summary\n\nNo structured linter errors were found.\n' > linter-summary.md
            echo "has-errors=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/ai-inference@a7805884c80886efc241e94a5351df715968a0ad # v2.1.1
        id: ai-linter-analysis
        if: failure() && steps.get-failed-linters.outputs.has-errors == 'true'
        with:
          model: mistral-ai/Ministral-3B
          input: |
            diff: ${{ steps.git-diff.outputs.raw-diff }}
            linter_summary:
            ${{ steps.get-failed-linters.outputs.has-errors == 'true' && 'available in linter-summary.md' || 'not available' }}
          prompt-file: ./linter-errors.json
          system-prompt: |
            You are an expert software engineer who specializes in diagnosing and fixing software build and runtime failures.
            Always provide structured reasoning and propose concrete fixes when possible.

            Task: Analyze the logs of the super-linter-output/ folder from the failed `ubuntu-latest` CI workflow run. Cross-reference the errors with the code diff to determine the root cause of the failure.
            {{ diff }}

            Context strategy (agent-ready):
            - Prioritize localization cues: identify exact files, line numbers, symbols, and changed hunks tied to failures.
            - Prioritize repair direction: propose one primary fix path and one minimal fallback patch.
            - De-prioritize generic narrative that does not narrow the fix search space.

            Objectives:
            1. **Diagnosis:** Identify patterns, anomalies, or dependencies that could explain the failure. What is the most probable root cause?
            2. **Reasoning:** Explain why this root cause is plausible — referencing specific log lines, timestamps, or stack traces.
            3. **Resolution:** If a fix is evident, describe your reasoning process and propose an exact code or configuration change. Present your solution as a unified diff (diff format), scoped to the smallest safe change.
            4. **Reflection:** If no clear fix is identifiable, summarize which parts of the log are ambiguous and what further information would be needed to proceed.

            Goal: Deliver an insightful and technically sound explanation that not only solves the issue but also strengthens understanding of the system's behavior and failure patterns.
          # jscpd:ignore-start
      - name: Get the entire analysis output
        id: get-analysis-output
        if: failure() && steps.get-failed-linters.outputs.has-errors == 'true'
        env:
          RESPONSE_FILE: ${{ steps.ai-linter-analysis.outputs.response-file }}
        run: |
          DELIM="EOF_$(uuidgen)"
          {
            printf "response<<%s\n" "$DELIM"
            cat "$RESPONSE_FILE"
            printf "\n%s\n" "$DELIM"
          } >> "$GITHUB_OUTPUT"
        # jscpd:ignore-end
      - name: Build dual-mode issue report
        id: build-issue-report
        if: failure()
        env:
          AI_RESPONSE: ${{ steps.get-analysis-output.outputs.response || '' }}
          HAS_ERRORS: ${{ steps.get-failed-linters.outputs.has-errors || 'false' }}
        run: |
          set -euo pipefail

          # Create agent-focused machine JSON payload with stable keys.
          if [ "$HAS_ERRORS" = "true" ] && [ -f linter-errors.json ]; then
            jq -n --slurpfile errs linter-errors.json --arg ai "$AI_RESPONSE" '
              {
                schema_version: "1.0",
                has_structured_errors: true,
                failing_count: ($errs[0] | length),
                failing_linters: ($errs[0] | map(.Linter // "unknown") | unique | sort),
                files: ($errs[0] | map(.Path // .FilePath // "unknown-path") | unique | sort),
                entries: ($errs[0] | map({
                  linter: (.Linter // "unknown"),
                  file: (.Path // .FilePath // "unknown-path"),
                  line: (.Line // .StartLine // null),
                  column: (.Column // .StartColumn // null),
                  message: (.Message // .Description // "")
                })),
                ai_analysis: ($ai // "")
              }
            ' > machine-report.json
          else
            jq -n --arg ai "$AI_RESPONSE" '
              {
                schema_version: "1.0",
                has_structured_errors: false,
                failing_count: 0,
                failing_linters: [],
                files: [],
                entries: [],
                ai_analysis: ($ai // "")
              }
            ' > machine-report.json
          fi

          # Create human summary.
          if [ "$HAS_ERRORS" = "true" ] && [ -f linter-summary.md ]; then
            cp linter-summary.md human-summary.md
          else
            printf '# Failed Linter Summary\n\nNo structured failing linter entries were detected.\n' > human-summary.md
          fi

          DELIM="EOF_$(uuidgen)"
          {
            printf "report<<%s\n" "$DELIM"
            printf '## Human Summary\n'
            cat human-summary.md
            printf '\n## Agent Data (JSON)\n```json\n'
            cat machine-report.json
            printf '```\n'
            printf "%s\n" "$DELIM"
          } >> "$GITHUB_OUTPUT"
      - uses: jayqi/failed-build-issue-action@1a893bbf43ef1c2a8705e2b115cd4f0fe3c5649b # v1.2.0
        if: failure()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          title-template: "super-linter GitHub action has failed"
          label-name: super-linter-issue
          body-template: |
            The linter step has failed. Please check for new major versions and update manually.

            Please check the [logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for more details.

            ${{ steps.build-issue-report.outputs.report }}
