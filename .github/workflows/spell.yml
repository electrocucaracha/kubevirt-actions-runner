name: Spelling Checks for Documentation
# yamllint disable-line rule:truthy
on:
  push:
    paths:
      - "**.md"
      - "!.github/*"
  pull_request_review:
    types:
      - submitted
permissions: read-all
jobs:
  check-reviewdog:
    name: Check spelling using reviewdog
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
      - name: Run misspell checker
        uses: reviewdog/action-misspell@d6429416b12b09b4e2768307d53bef58d172e962 # 1.27.0
        with:
          github_token: ${{ secrets.github_token }}
  check-spellcheck:
    name: Check spelling using pyspelling
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
      - name: Run pyspelling checker
        uses: igsekor/pyspelling-any@44278deea34ea69d8f0d5179ac409c140b0a2f5a # 1.0.5
