name: Code Quality Verifiers
# yamllint disable-line rule:truthy
on:
  push:
    paths:
      - "**.go"
  schedule:
    - cron: "0 0 * * 5"
  workflow_dispatch:
permissions: read-all
jobs:
  check-golangci:
    name: Run Go linter checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
      issues: write
    steps:
      # jscpd:ignore-start
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "^1.26"
          cache: false
          # jscpd:ignore-end
      - name: Run golangci-lint tool
        id: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          args: --allow-parallel-runners --output.json.path linter-errors.json
      - uses: actions/ai-inference@a7805884c80886efc241e94a5351df715968a0ad # v2.1.1
        id: ai-linter-analysis
        if: failure()
        with:
          model: mistral-ai/Ministral-3B
          prompt-file: ./linter-errors.json
          system-prompt: |
            You are a senior Go engineer interpreting golangci-lint output and converting it into a concise, GitHub-ready issue.

            Task: Analyze the provided golangci-lint output and generate a COMPLETE issue description that contains enough technical detail for another developer to fix the problem without additional context.

            HARD REQUIREMENTS:
            - Output MUST be valid Markdown.
            - Use Markdown headings (##), bullet points, and code blocks where appropriate.
            - Do NOT include CI status messages or references to external logs.
            - Do NOT invent code or context beyond the lint output.
            - Cover every reported issue.
            - Group repeated findings from the same linter when applicable.
            - Explicitly mention affected functions, variables, or constructs when named in the lint output.

            Required Markdown Structure:
            ## Issues
            For each issue or grouped set, include:
            - **Linter**
            - **File & line(s)**
            - **Affected code element(s)** (function, variable, or construct name if provided)
            - **Problem** (what the linter is flagging)
            - **Why it matters** (risk or best-practice violation)

            Style:
            - Technical, precise, and concise.
            - Assume a Go developer audience.
            - Avoid filler or meta commentary.
            - Do not suggest disabling linters unless clearly justified.

            Goal: Produce a full comprehensive but sufficiently detailed Markdown issue description that enables another developer to implement the fix confidently.
          # jscpd:ignore-start
      - name: Get the entire analysis output
        id: get-analysis-output
        if: failure()
        env:
          RESPONSE_FILE: ${{ steps.ai-linter-analysis.outputs.response-file }}
        run: |
          DELIM="EOF_$(uuidgen)"
          {
            printf "response<<%s\n" "$DELIM"
            cat "$RESPONSE_FILE"
            printf "\n%s\n" "$DELIM"
          } >> "$GITHUB_OUTPUT"
        # jscpd:ignore-end
      - uses: jayqi/failed-build-issue-action@1a893bbf43ef1c2a8705e2b115cd4f0fe3c5649b # v1.2.0
        if: failure()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          title-template: "golangci-lint GitHub action has failed"
          label-name: golangci-lint-issue
          body-template: |
            The golangci-lint step has failed.

            Please check the [logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for more details.

            ${{ steps.get-analysis-output.outputs.response }}
  reduce-tech-debt:
    name: Analyze and reduce technical debt
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # jscpd:ignore-start
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install rtk token saver
        run: |
          curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
          rtk --version
          rtk init --global --copilot
      - name: Run Copilot CLI
        uses: austenstone/copilot-cli@122f2d1522fdec4497d11fe57965ac0112db87e3 # v3.2
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          allow-all-tools: true
          repo-token: ${{ github.actor == 'electrocucaracha[bot]' && secrets.COPILOT_TOKEN || github.token }}
          mcp-config: |
            {
              "mcpServers": {
                "github-mcp-server": {
                  "type": "http",
                  "url": "https://api.githubcopilot.com/mcp/",
                  "headers": {
                    "Authorization": "Bearer ${{ secrets.COPILOT_TOKEN }}",
                    "X-MCP-Toolsets": "*"
                  },
                  "tools": ["*"]
                }
              }
            }
          # jscpd:ignore-end
          agent: janitor
          prompt: |-
            Reduce technical debt and submit a Pull Request with the improvements.

            Workflow:
            1. Analyze the repo for unused code, duplication, dead paths, and unnecessary complexity.
            2. Delete and simplify safely. Preserve behavior and avoid breaking public APIs.
            3. Validate by running: make test
            4. Create a new branch and push it:
               - git checkout -b tech-debt-reduction
               - git push origin tech-debt-reduction
            5. Submit Pull Request via GitHub:
               - Use GitHub CLI: gh pr create \
                 --title "chore: reduce technical debt" \
                 --body "Summary of changes, rationale, tests passing, and confirmation of no breaking changes." \
                 --base main \
                 --head tech-debt-reduction
               - Keep the diff focused and reviewable.
      - name: Get rtk stats
        run: rtk gain
  improve-code-coverage:
    name: Analyze code coverage and submit improvements
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # jscpd:ignore-start
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install rtk token saver
        run: |
          curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
          rtk --version
          rtk init --global --copilot
      - name: Run Copilot CLI
        uses: austenstone/copilot-cli@122f2d1522fdec4497d11fe57965ac0112db87e3 # v3.2
        with:
          copilot-token: ${{ secrets.COPILOT_TOKEN }}
          allow-all-tools: true
          repo-token: ${{ github.actor == 'electrocucaracha[bot]' && secrets.COPILOT_TOKEN || github.token }}
          mcp-config: |
            {
              "mcpServers": {
                "github-mcp-server": {
                  "type": "http",
                  "url": "https://api.githubcopilot.com/mcp/",
                  "headers": {
                    "Authorization": "Bearer ${{ secrets.COPILOT_TOKEN }}",
                    "X-MCP-Toolsets": "*"
                  },
                  "tools": ["*"]
                }
              }
            }
          # jscpd:ignore-end
          agent: qa-subagent
          prompt: |-
            Increase code coverage and submit a Pull Request with the improvements.

            Workflow:
            1. Analyze the latest results of unit-test and gremlins-test GitHub Actions jobs to identify uncovered code paths and functions.
            2. Write new tests to cover those paths, ensuring they are meaningful and validate important edge cases.
            3. Validate by running: make test
            4. Create a new branch and push it:
               - git checkout -b increase-code-coverage
               - git push origin increase-code-coverage
            5. Submit Pull Request via GitHub:
               - Use GitHub CLI: gh pr create \
                 --title "test: increase code coverage" \
                 --body "Summary of added tests, rationale for coverage improvement, tests passing, and confirmation of no breaking changes." \
                 --base main \
                 --head increase-code-coverage
               - Keep the diff focused and reviewable.
      - name: Get rtk stats
        run: rtk gain
