name: "CI: End-to-End Validation"
# yamllint disable-line rule:truthy
on:
  push:
    paths:
      - "**.go"
      - "**.sh"
      - "!.github/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  pull_request_review:
    types:
      - submitted
permissions: read-all
concurrency:
  group: on-demand-ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check-scripts-format:
    name: Validate shell script formatting
    permissions:
      contents: read
    if: ( github.event_name == 'pull_request_review' && github.event.review.state == 'approved' ) || github.event_name != 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run shell script checker
        uses: luizm/action-sh-checker@883217215b11c1fabbf00eb1a9a041f62d74c744 # v0.10.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHFMT_OPTS: -i 4 -s
        with:
          sh_checker_shellcheck_disable: true
  functional-test:
    name: Run Functional Tests on Self-Hosted Runner
    needs: check-scripts-format
    runs-on: vm-self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run demo
        working-directory: ./scripts
        env:
          DEBUG: true
          PROVISION_PHASES: "install configure demo"
        run: ./main.sh
      - name: Export logs
        if: always()
        run: |
          kind export logs --name k8s -v 4 ./_artifacts/logs
      - name: Upload cluster logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kind-logs-${{ github.run_id }}
          path: ./_artifacts/logs
