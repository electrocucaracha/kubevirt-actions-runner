name: Build and Publish Docker Image
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches:
      - "master"
    tags:
      - "v*"
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  changes:
    name: Analyze changes and filter paths
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      golang: ${{ steps.filter.outputs.golang }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
      - name: Filter changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # 4.0.1
        if: ${{ !env.ACT }}
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            golang:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
            docker:
              - Dockerfile
  code-coverage:
    name: Analyze code coverage for Go files
    if: needs.changes.outputs.golang == 'true'
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: true
          fetch-depth: 10
      - name: Setup Go environment
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # 6.3.0
        with:
          go-version: "^1.26"
          cache: false
      - name: Run code coverage analysis
        uses: gwatts/go-coverage-action@2845595538a59d63d1bf55f109c14e104c6f7cb3 # 2.0.0
        with:
          coverage-threshold: 45
  unit-test:
    name: Run Go unit tests
    if: needs.changes.outputs.golang == 'true'
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # 6.3.0
        with:
          go-version: "^1.26"
          cache: false
      - uses: GoTestTools/gotestfmt-action@8b4478c7019be847373babde9300210e7de34bfb # 2.2.0
      - name: Run tests
        run: |
          set -euo pipefail
          go test -json -v ./... 2>&1 | tee /tmp/gotest.log | gotestfmt
      - name: Upload test log
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        if: ${{ !env.ACT }}
        with:
          name: test-log
          path: /tmp/gotest.log
          if-no-files-found: error
  push-registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    needs: [code-coverage, unit-test, changes]
    if: |
      always() &&
      (
        (
          needs.changes.outputs.golang == 'true' &&
          contains(needs.*.result, 'success') &&
          !contains(needs.*.result, 'failure')
        )
        || needs.changes.outputs.docker == 'true'
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
      - name: Build Docker image
        id: docker-build
        run: |
          set -o pipefail
          docker build -t test . 2>&1 | tee docker-build.log
      - name: Run Docker container
        id: docker-run
        run: |
          set -o pipefail
          docker run --rm test:latest --help 2>&1 | tee -a docker-build.log
      - uses: actions/ai-inference@af6ad2c4ac4edf01884054fc3a6caa6d2567c13a # 2.0.8
        id: ai-docker-analysis
        if: failure()
        with:
          model: mistral-ai/Ministral-3B
          prompt-file: docker-build.log
          system-prompt: |
            You are a senior DevOps engineer specializing in Docker and CI container failures.

            Task:
            Analyze the provided Docker build or runtime failure logs and produce a complete, GitHub-ready issue description.

            Requirements:
            - Output MUST be valid Markdown.
            - Use headings and code blocks.
            - Do NOT reference CI URLs or external logs.
            - Do NOT invent missing context.
            - Base conclusions strictly on the provided log output.

            Required Structure:

            ## Summary
            Brief technical description of what failed and whether it occurred during Build or Runtime.

            ## Failure Details
            - **Stage:** Build | Runtime
            - **Failing instruction/command**
            - **Relevant log excerpt:**
              ```text
              (key error lines only)
              ```

            ## Root Cause
            Clear explanation derived only from the logs.
            Reference the Dockerfile instruction or runtime command when visible.

            ## Impact
            State practical impact:
            - Blocks image build?
            - Prevents container startup?
            - Breaks CI or deployment?
            Clearly indicate severity.

            ## Fix
            Provide specific, actionable remediation steps.
            Avoid vague advice.

            Style:
            Technical, concise, precise. No filler. No speculation.

            Goal:
            Produce a focused issue that enables a developer to fix the container failure without reviewing raw logs.
      - uses: jayqi/failed-build-issue-action@1a893bbf43ef1c2a8705e2b115cd4f0fe3c5649b # 1.2.0
        if: failure()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          title-template: "Docker build or runtime failure"
          label-name: docker-build-issue
          body-template: |
            The Docker build or container execution step has failed.

            ${{ steps.ai-docker-analysis.outputs.response }}
      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # 4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # 6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # 7.0.0
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # 4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
