name: "CI: Build, Test, and Publish Image"
# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches:
      - "master"
    tags:
      - "v*"
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      golang: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.golang }}
      docker: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.docker }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Filter changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        if: ${{ !env.ACT }}
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            golang:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
            docker:
              - Dockerfile
  code-coverage:
    name: Check Go Coverage Threshold
    if: needs.changes.outputs.golang == 'true'
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: write # NOTE: gwatts/go-coverage-action uses git notes during the analysis
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          fetch-depth: 10
      - name: Setup Go environment
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "^1.26"
          cache: false
      - name: Run code coverage analysis
        uses: gwatts/go-coverage-action@2845595538a59d63d1bf55f109c14e104c6f7cb3 # v2.0.0
        with:
          coverage-threshold: 45
  unit-test:
    name: Run Go Unit Tests
    if: needs.changes.outputs.golang == 'true'
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "^1.26"
          cache: false
      - uses: GoTestTools/gotestfmt-action@eba2ac97f623e866e7b1b117c99f18b43cd36d18 # v2.3.0
      - name: Run tests
        run: |
          set -euo pipefail
          go test -json -v ./... 2>&1 | tee /tmp/gotest.log | gotestfmt
      - name: Upload test log
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !env.ACT }}
        with:
          name: test-log
          path: /tmp/gotest.log
          if-no-files-found: error
  gremlins-test:
    name: Run Go Mutation Tests
    if: needs.changes.outputs.golang == 'true'
    needs: [changes, unit-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Go environment
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "^1.26"
          cache: false
      - name: Run Gremlins mutation tests
        uses: go-gremlins/gremlins-action@9dc8e981be89dbf79258cdd1400c54e762c770fe # v1.0.3
        with:
          version: v0.6.0
  push-registry:
    name: Build, Validate, and Publish Image to GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      issues: write
      attestations: write
      id-token: write
    needs: [code-coverage, unit-test, gremlins-test, changes]
    if: |
      always() &&
      (
        (
          needs.changes.outputs.golang == 'true' &&
          needs.code-coverage.result == 'success' &&
          needs.unit-test.result == 'success' &&
          needs.gremlins-test.result == 'success'
        ) || needs.changes.outputs.docker == 'true'
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build Docker image
        id: docker-build
        run: |
          set -o pipefail
          docker build -t test . 2>&1 | tee docker-build.log
      - name: Run Docker container
        id: docker-run
        run: |
          set -o pipefail
          docker run --rm test:latest --help 2>&1 | tee -a docker-build.log
      - uses: actions/ai-inference@a7805884c80886efc241e94a5351df715968a0ad # v2.1.1
        id: ai-docker-analysis
        if: failure()
        with:
          model: mistral-ai/Ministral-3B
          prompt-file: docker-build.log
          system-prompt: |
            You are a senior DevOps engineer specializing in Docker and CI container failures.

            Task:
            Analyze the provided Docker build or runtime failure logs and produce a complete, GitHub-ready issue description.

            Requirements:
            - Output MUST be valid Markdown.
            - Use headings and code blocks.
            - Do NOT reference CI URLs or external logs.
            - Do NOT invent missing context.
            - Base conclusions strictly on the provided log output.

            Required Structure:

            ## Summary
            Brief technical description of what failed and whether it occurred during Build or Runtime.

            ## Failure Details
            - **Stage:** Build | Runtime
            - **Failing instruction/command**
            - **Relevant log excerpt:**
              ```text
              (key error lines only)
              ```

            ## Root Cause
            Clear explanation derived only from the logs.
            Reference the Dockerfile instruction or runtime command when visible.

            ## Impact
            State practical impact:
            - Blocks image build?
            - Prevents container startup?
            - Breaks CI or deployment?
            Clearly indicate severity.

            ## Fix
            Provide specific, actionable remediation steps.
            Avoid vague advice.

            Style:
            Technical, concise, precise. No filler. No speculation.

            Goal:
            Produce a focused issue that enables a developer to fix the container failure without reviewing raw logs.
      - uses: jayqi/failed-build-issue-action@1a893bbf43ef1c2a8705e2b115cd4f0fe3c5649b # v1.2.0
        if: failure()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          title-template: "Docker build or runtime failure"
          label-name: docker-build-issue
          body-template: |
            The Docker build or container execution step has failed.

            ${{ steps.ai-docker-analysis.outputs.response }}
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
